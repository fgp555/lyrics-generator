<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Bilingual Lyric Reader</title>
  </head>
  <body>
    <header class="progress-container">
      <div class="progress" id="progress"></div>
    </header>

    <main class="lyric_section">
      <div class="main_en"></div>
      <div class="main_es"></div>
      <div id="audio-player"></div>
    </main>

    <div class="chapter_time" style="display: none">
      <span class="currentTimeDOM"></span> /
      <span class="durationDOM"></span>
    </div>

    <footer style="display: none"></footer>

    <script src="script.js" defer></script>
  </body>
</html>
